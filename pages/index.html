<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Control Panel</title>
    <script src="ds:/Sys/app.js"></script>
    <script src="pages.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="app.Start()">

    <div id="toast"></div>

    <!-- service dan raqam qabul qilish uchun button -->
    <button onclick="
    document.getElementById('TEL_NUM').innerText = window.NUMBER;
    document.getElementById('phoneInput').value = window.NUMBER;
    document.getElementById('phoneUpdateName').value = window.NUMBER;
    document.getElementById('phoneUpdateRole').value = window.NUMBER;
    "> NUMBER </button>
    <h3 id="TEL_NUM"></h3>

    <div class="section">
        <h3>Insert User</h3>
        <input id="phoneInput" type="tel" placeholder="Phone (+998900000000)">
        <input id="roleInput" type="text" placeholder="Role (admin / driver / shipper)">
        <button class="btn-primary" onclick="INSERT_USER_PHONE_ROLE_(
            document.getElementById('phoneInput').value,
            document.getElementById('roleInput').value
        )">Add User</button>
    </div>

    <div class="section">
        <h3>Update User Name</h3>
        <input id="phoneUpdateName" type="tel" placeholder="Phone">
        <input id="nameInput" type="text" placeholder="New Name">
        <button class="btn-success" onclick="UPDATE_USER_NAME_BY_PHONE_(
            document.getElementById('phoneUpdateName').value,
            document.getElementById('nameInput').value
        )">Update Name</button>
    </div>

    <div class="section">
        <h3>Update User Role</h3>
        <input id="phoneUpdateRole" type="tel" placeholder="Phone">
        <input id="roleUpdateInput" type="text" placeholder="New Role">
        <button class="btn-warning" onclick="UPDATE_USER_ROLE_BY_PHONE_(
            document.getElementById('phoneUpdateRole').value,
            document.getElementById('roleUpdateInput').value
        )">Update Role</button>
    </div>
</body>
</html>
